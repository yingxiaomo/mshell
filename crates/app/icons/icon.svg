<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg)"/>
  <!-- Terminal prompt ">_" -->
  <text x="256" y="300" font-family="'Cascadia Code', 'Consolas', 'Menlo', monospace" font-size="260" font-weight="bold" text-anchor="middle" fill="#38bdf8">$_</text>
  <!-- Accent dot -->
  <circle cx="400" cy="380" r="24" fill="#38bdf8" opacity="0.3"/>
</svg>
